<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/kronos-icon.png" />
    <link rel="apple-touch-icon" href="/kronos-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kronos HCF — Developer Documentation</title>
    <meta name="description" content="Developer documentation for the Kronos HCF Spigot plugin." />
    <script>
      (function () {
        var stored = localStorage.getItem('kronos-theme');
        var isDark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.classList.toggle('dark', isDark);
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
      })();
    </script>
  </head>
  <body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-sans antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
